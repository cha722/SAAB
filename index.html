<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz SVT - La Méduse Aurélia</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            margin: auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2rem;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 8px;
        }

        header p {
            color: #64748b;
            font-size: 1.1rem;
        }

        .quiz-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
            border: 1px solid #e2e8f0;
        }

        .question {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--primary);
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option-btn {
            background: none;
            border: 1px solid #cbd5e1;
            padding: 16px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            color: var(--text);
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #f1f5f9;
            border-color: var(--secondary);
        }

        .option-btn.correct {
            background-color: #ecfdf5;
            border-color: var(--success);
            color: #065f46;
        }

        .option-btn.incorrect {
            background-color: #fef2f2;
            border-color: var(--error);
            color: #991b1b;
        }

        .action-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background-color: var(--secondary);
        }

        .results {
            text-align: center;
        }

        .results h2 {
            font-size: 1.75rem;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .score {
            font-size: 3rem;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 25px;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.85rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Quiz SVT : La Méduse Aurélia</h1>
            <p>Par Omar Chaar, Lamar Bsat & Sirine Betto</p>
        </header>

        <main class="quiz-card" id="quiz-box">
            <div id="quiz-ui">
                <div class="question" id="question-text">Chargement de la question...</div>
                <div class="options-list" id="options-box"></div>
                <button class="action-btn" id="next-btn" style="display: none;">Question suivante</button>
            </div>

            <div id="result-ui" class="results" style="display: none;">
                <h2>Évaluation Terminée</h2>
                <div class="score" id="final-score">0 / 0</div>
                <button class="action-btn" onclick="resetQuiz()">Recommencer le test</button>
            </div>
        </main>

        <footer>
            Projet de Sciences de la Vie et de la Terre — Classe de 5eC — 2026
        </footer>
    </div>

    <script>
        const questions = [
            {
                q: "Quel est le mode de reproduction asexuée observé chez la méduse Aurélia ?",
                options: ["Le bourgeonnement", "La strobilisation", "La division binaire"],
                correct: 1
            },
            {
                q: "À quel stade de développement la reproduction asexuée a-t-elle lieu ?",
                options: ["Au stade de strobile (larve fixée)", "Au stade de méduse adulte", "Au stade d'œuf flottant"],
                correct: 0
            },
            {
                q: "Où se situe précisément le strobile dans son écosystème ?",
                options: ["En pleine mer à la surface", "Fixé au fond de la mer", "À l'intérieur d'une autre méduse"],
                correct: 1
            },
            {
                q: "Quel est le résultat biologique de la division du strobile ?",
                options: ["La production d'une seule méduse géante", "La production d'une centaine de jeunes méduses identiques", "La disparition de la colonie"],
                correct: 1
            },
            {
                q: "Quel est le principal avantage de ce mode de reproduction pour l'espèce ?",
                options: ["Augmenter ses chances de reproduction et coloniser facilement le milieu", "Changer de régime alimentaire", "Résister aux variations de température"],
                correct: 0
            }
        ];

        let indexCurrent = 0;
        let score = 0;

        const qText = document.getElementById('question-text');
        const oBox = document.getElementById('options-box');
        const btnNext = document.getElementById('next-btn');
        const uiQuiz = document.getElementById('quiz-ui');
        const uiResult = document.getElementById('result-ui');
        const txtScore = document.getElementById('final-score');

        function startQuiz() {
            indexCurrent = 0;
            score = 0;
            uiQuiz.style.display = 'block';
            uiResult.style.display = 'none';
            loadQuestion();
        }

        function loadQuestion() {
            btnNext.style.display = 'none';
            oBox.innerHTML = '';
            
            let current = questions[indexCurrent];
            qText.innerText = `${indexCurrent + 1}. ${current.q}`;

            current.options.forEach((opt, idx) => {
                const button = document.createElement('button');
                button.innerText = opt;
                button.classList.add('option-btn');
                button.addEventListener('click', () => checkAnswer(button, idx));
                oBox.appendChild(button);
            });
        }

        function checkAnswer(selectedBtn, idxOption) {
            let current = questions[indexCurrent];
            const allBtns = oBox.querySelectorAll('.option-btn');

            allBtns.forEach(b => b.disabled = true);

            if (idxOption === current.correct) {
                selectedBtn.classList.add('correct');
                score++;
            } else {
                selectedBtn.classList.add('incorrect');
                allBtns[current.correct].classList.add('correct');
            }

            btnNext.style.display = 'block';
        }

        btnNext.addEventListener('click', () => {
            indexCurrent++;
            if (indexCurrent < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        });

        function showResults() {
            uiQuiz.style.display = 'none';
            uiResult.style.display = 'block';
            txtScore.innerText = `${score} / ${questions.length}`;
        }

        function resetQuiz() {
            startQuiz();
        }

        // Lancement automatique au chargement
        startQuiz();
    </script>
</body>
</html>
